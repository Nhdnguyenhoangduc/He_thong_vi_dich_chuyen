name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit Tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless numpy pyserial matplotlib pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  docs-check:
    name: Docs completeness check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          for f in \
            docs/architecture.md \
            docs/methodology.md \
            docs/experiments.md \
            docs/api.md \
            README.md \
            CONTRIBUTING.md \
            CHANGELOG.md \
            LICENSE; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
            echo "OK: $f"
          done

  firmware-check:
    name: Arduino firmware present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check .ino file exists
        run: |
          [ -f "arduino/stepper_controller/stepper_controller.ino" ] \
            && echo "OK: firmware found" \
            || { echo "MISSING: stepper_controller.ino"; exit 1; }
